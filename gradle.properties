# Allocate more memory to the Gradle daemon — Android builds are memory-hungry
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use the new AndroidX namespace (required for modern Android libraries)
android.useAndroidX=true

# Non-transitive R classes: each module only sees its own resources, not all
# transitive deps. Reduces build time and avoids resource name collisions.
android.nonTransitiveRClass=true
